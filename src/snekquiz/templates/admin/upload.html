{% extends "base.html" %}
{% block title %}Upload Quiz – Admin{% endblock %}

{% block content %}
<section class="admin-page">
  <a href="{{ request.url_for('admin_dashboard') }}" class="back-link">&larr; Dashboard</a>
  <h1>Upload Quiz</h1>

  {% if error %}
  <div class="alert alert-error">{{ error }}</div>
  {% endif %}

  <form method="post" action="{{ request.url_for('admin_upload_submit') }}" class="upload-form">
    <label for="quiz_json">Paste quiz JSON</label>
    <textarea id="quiz_json" name="quiz_json" rows="20" placeholder='{ "quiz_name": "...", "questions": [...] }'
      required>{{ prefill or "" }}</textarea>
    <button type="submit" class="btn btn-primary">Upload</button>
  </form>
</section>
{% endblock %}
