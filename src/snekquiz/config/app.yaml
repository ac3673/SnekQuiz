app_title: SnezQuiz
db:
  path: "data/snekquiz.db"

auth:
  # In production, override via environment variables or a separate secrets file
  admins:
    admin: "admin"
  users:
    alice: "password123"
    bob: "password456"

  # Optional: Active Directory / LDAP authentication
  # Users not found in the local admins/users maps above will be
  # authenticated via LDAP simple-bind when server_url is set.

  #ldap:
    #server_url: # e.g. "ldaps://ad.example.com:636"
    #search_base: # e.g. "DC=example,DC=com"
    #domain: # e.g. "CORP" -- binds as CORP\username
    #search_filter: # e.g. "(&(objectclass=person)(SamAccountName={username}))"
    #group_attrib: # e.g. "memberOf"
    #use_ssl: true
    #admin_groups: [] # e.g. [QuizAdmins] (only the CN= part is used from "CN=QuizAdmins,OU=Groups,DC=example,DC=com"
