version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s %(name)-10s %(levelname)-8s %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: standard
    stream: ext://sys.stdout
  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: standard
    filename: data/snekquiz.log
    maxBytes: 5242880
    backupCount: 3

loggers:
  snekquiz:
    level: DEBUG
    handlers: [console, file]
    propagate: false
  uvicorn:
    level: INFO
    handlers: [console, file]
    propagate: false

root:
  level: WARNING
  handlers: [console]
